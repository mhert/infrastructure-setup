all:
  hosts:
    laptop-framework-intel-core-v12-1:
      ansible_connection: local
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
      ansible_host:
      ansible_user:
      ansible_ssh_pass:
      ansible_become:
      ansible_become_user:
      ansible_become_pass:
      install_device_dir: /dev/
      install_device: /dev/nvme0n1
      efi_device: /dev/nvme0n1p1
      system_encrypted_device: /dev/nvme0n1p2
      system_decrypted_device_name: system
      system_decrypted_device: /dev/mapper/system
      swap_size: 64G
      system_partition_size: "3TB"
      cryptsetup_format_options: "--sector-size 4096 --cipher aes-xts-plain64 --key-size 512 --hash sha512"
      cryptsetup_open_options: "--perf-no_read_workqueue --perf-no_write_workqueue --allow-discards --persistent"
      hostname:

