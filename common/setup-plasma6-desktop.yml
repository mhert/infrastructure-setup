- hosts: all
  tasks:
    - name: Install plasma-6 desktop packages
      block:
        - shell: |
            arch-chroot /mnt pacman -Sy --noconfirm adobe-source-code-pro-fonts \
                                                    adobe-source-sans-fonts \
                                                    adobe-source-serif-fonts \
                                                    breeze-gtk \
                                                    kde-gtk-config \
                                                    colord \
                                                    colord-kde \
                                                    cups \
                                                    flatpak \
                                                    flatpak-kcm \
                                                    flatpak-xdg-utils \
                                                    gutenprint \
                                                    jdk-openjdk \
                                                    pavucontrol \
                                                    plasma-browser-integration \
                                                    plasma-meta \
                                                    ttf-dejavu \
                                                    xdg-desktop-portal-kde
        - shell: |
            arch-chroot /mnt pacman -Sy --noconfirm cameractrls \
                                                    firefox \
                                                    firefox-developer-edition \
                                                    gimp \
                                                    kde-graphics-meta \
                                                    kde-multimedia-meta \
                                                    kde-network-meta \
                                                    kde-sdk-meta \
                                                    kde-system-meta \
                                                    kde-utilities-meta \
                                                    libreoffice-fresh \
                                                    libreoffice-fresh-de \
                                                    gcompris-qt \
                                                    inkscape \
                                                    meld \
                                                    okteta \
                                                    qbittorrent \
                                                    qcachegrind \
                                                    qopenvpn \
                                                    qpwgraph \
                                                    signal-desktop \
                                                    spotify-launcher \
                                                    system-config-printer \
                                                    steam \
                                                    tesseract-data-deu \
                                                    tk \
                                                    v4l-utils \
                                                    virt-manager \
                                                    vlc \
                                                    wine \
                                                    wine-gecko \
                                                    wine-mono \
                                                    winetricks \
                                                    yakuake
        - shell: |
            arch-chroot /mnt pacman -Sy --noconfirm virtualbox \
                                                    virtualbox-host-modules-arch \
                                                    virtualbox-guest-iso

    - name: Configure plasma-login-manager
      block:
        - shell: arch-chroot /mnt systemctl enable plasmalogin

    - name: Configure cups
      block:
        - shell: arch-chroot /mnt systemctl enable cups

    - name: Configure libvirt
      block:
        - shell: arch-chroot /mnt systemctl enable libvirtd
