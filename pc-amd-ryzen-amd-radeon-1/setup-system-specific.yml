- hosts: pc-amd-ryzen-amd-radeon-1
  tasks:
    - name: Install system specific packages
      shell: |
        arch-chroot /mnt pacman -Sy --noconfirm bluez \
                                                amdvlk \
                                                bluez-utils \
                                                lib32-amdvlk \
                                                lib32-mesa \
                                                libva-mesa-driver \
                                                mesa

    - name: Configure bluetooth
      block:
        - shell: arch-chroot /mnt systemctl enable bluetooth
