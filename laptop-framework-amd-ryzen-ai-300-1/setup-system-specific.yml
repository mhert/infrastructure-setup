- hosts: laptop-framework-amd-ryzen-ai-300-1
  tasks:
    - name: Install system specific packages
      shell: |
        arch-chroot /mnt pacman -Sy --noconfirm amdgpu_top \
                                                amd-ucode \
                                                bluez \
                                                bluez-utils \
                                                fprintd \
                                                iio-sensor-proxy \
                                                iwd \
                                                lib32-mesa \
                                                lib32-vulkan-radeon \
                                                libva-mesa-driver \
                                                libva-utils \
                                                mesa \
                                                rocm-hip-sdk \
                                                rocm-opencl-sdk \
                                                sof-firmware \
                                                vulkan-icd-loader \
                                                vulkan-radeon \
                                                wireless-regdb

    - name: Disable AMDGPU panel power savings
      block:
        - file:
            path: /mnt/etc/systemd/system/power-profiles-daemon.service.d
            state: directory
        - copy:
            src: etc/systemd/system/power-profiles-daemon.service.d/disable_panel_powersavings.conf
            dest: /mnt/etc/systemd/system/power-profiles-daemon.service.d/disable_panel_powersavings.conf

    - name: Configure bluetooth
      block:
        - shell: arch-chroot /mnt systemctl enable bluetooth

    - name: Configure wifi
      block:
        - shell: arch-chroot /mnt systemctl enable iwd

    - name: Configure wireless-regdb
      block:
        - copy:
            content: |
              WIRELESS_REGDOM="DE"
            dest: /mnt/etc/conf.d/wireless-regdom
